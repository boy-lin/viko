name: Build Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"
          - platform: "ubuntu-latest"
            args: "--target x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        shell: bash
        run: |
          if [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            rustup target add aarch64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            rustup target add x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"x86_64-pc-windows-msvc"* ]]; then
            rustup target add x86_64-pc-windows-msvc
          elif [[ "${{ matrix.args }}" == *"x86_64-unknown-linux-gnu"* ]]; then
            rustup target add x86_64-unknown-linux-gnu
          fi

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: ${{ matrix.args }}

      - name: Extract target from args
        id: extract_target
        run: |
          TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.args }}
          path: |
            src-tauri/target/${{ steps.extract_target.outputs.target }}/release/bundle/
          if-no-files-found: warn
