name: Build Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    environment: production
    env:
      VITE_GOOGLE_ANALYTICS_ID: ${{ vars.VITE_GOOGLE_ANALYTICS_ID }}
      VITE_BASE_API_URL: ${{ vars.VITE_BASE_API_URL }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APP_RELEASE_CI_TOKEN: ${{ secrets.APP_RELEASE_CI_TOKEN }}
      UPDATER_API_BASE: ${{ vars.UPDATER_API_BASE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: "macos-latest" # ARM64 (M1/M2)
          #   args: "--target aarch64-apple-darwin"
          # - platform: "macos-12"     # Intel (x86_64) - Reverted to macos-12 as macos-13 is unsupported; expect wait times
          #   args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"
          # - platform: "ubuntu-latest"
          #   args: "--target x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libavutil-dev libavcodec-dev libavformat-dev libavfilter-dev libswscale-dev libavdevice-dev libasound2-dev

      - name: Install dependencies (macOS only)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install ffmpeg pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/opt/ffmpeg/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install dependencies (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Install or update vcpkg
          $vcpkgPath = "C:\vcpkg"
          if (Test-Path $vcpkgPath) {
            Write-Host "vcpkg detected at $vcpkgPath"
          } else {
            Write-Host "Installing vcpkg..."
            git clone https://github.com/microsoft/vcpkg.git $vcpkgPath
          }

          # Bootstrap vcpkg
          cd $vcpkgPath
          .\bootstrap-vcpkg.bat
          echo "$vcpkgPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          # Install FFmpeg (with drawtext dependencies) and pkgconf via vcpkg
          Write-Host "Installing FFmpeg and pkgconf via vcpkg..."
          .\vcpkg.exe install "ffmpeg[gpl,x264,x265,drawtext,freetype,fontconfig,fribidi]:x64-windows" pkgconf:x64-windows --recurse
          
          # Set PKG_CONFIG_PATH
          $vcpkgRoot = if ($env:VCPKG_ROOT) { $env:VCPKG_ROOT } else { "C:\vcpkg" }
          # Explicitly set VCPKG_ROOT for build scripts that rely on it
          echo "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          $pkgConfigPath = Join-Path $vcpkgRoot "installed\x64-windows\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          # Add pkgconf to PATH
          $pkgconfBin = Join-Path $vcpkgRoot "installed\x64-windows\tools\pkgconf"
          echo $pkgconfBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Set BINDGEN_EXTRA_CLANG_ARGS for bindgen to find includes
          $includePath = Join-Path $vcpkgRoot "installed\x64-windows\include"
          # Convert backslashes to forward slashes for clang compatibility
          $includePath = $includePath -replace '\\', '/'
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$includePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Set LIBCLANG_PATH to ensure bindgen uses the correct clang
          # GitHub Actions windows-latest has LLVM installed
          $llvmPath = $env:LLVM_ROOT
          if ($null -eq $llvmPath) {
              $llvmPath = "C:\Program Files\LLVM"
          }
          $libClangPath = Join-Path $llvmPath "bin"
          echo "LIBCLANG_PATH=$libClangPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        shell: bash
        run: |
          if [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            rustup target add aarch64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            rustup target add x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"x86_64-pc-windows-msvc"* ]]; then
            rustup target add x86_64-pc-windows-msvc
          elif [[ "${{ matrix.args }}" == *"x86_64-unknown-linux-gnu"* ]]; then
            rustup target add x86_64-unknown-linux-gnu
          fi

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri
        shell: bash
        run: |
          pnpm tauri build ${{ matrix.args }} --verbose

      - name: Debug DMG bundling failure
        if: failure() && startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          TARGET="${{ matrix.args }}"
          TARGET="${TARGET#--target }"
          DMG_DIR="src-tauri/target/${TARGET}/release/bundle/dmg"
          echo "Inspecting $DMG_DIR"
          ls -la "$DMG_DIR" || true
          if [[ -f "$DMG_DIR/bundle_dmg.sh" ]]; then
            echo "----- bundle_dmg.sh -----"
            cat "$DMG_DIR/bundle_dmg.sh"
            echo "----- rerun with bash -x -----"
            bash -x "$DMG_DIR/bundle_dmg.sh" || true
          fi

      - name: Resolve updater upload metadata
        id: updater_meta
        shell: bash
        run: |
          TARGET="${{ matrix.args }}"
          TARGET="${TARGET#--target }"
          case "$TARGET" in
            aarch64-apple-darwin)
              PLATFORM="darwin-aarch64"
              UPDATER_PATTERN="*.app.tar.gz"
              INSTALLER_PATTERN="*.dmg"
              ;;
            x86_64-apple-darwin)
              PLATFORM="darwin-x86_64"
              UPDATER_PATTERN="*.app.tar.gz"
              INSTALLER_PATTERN="*.dmg"
              ;;
            x86_64-pc-windows-msvc)
              PLATFORM="windows-x86_64"
              UPDATER_PATTERN="*.msi.zip"
              INSTALLER_PATTERN="*.msi"
              ;;
            *)
              echo "Unsupported target for updater upload: $TARGET"
              exit 1
              ;;
          esac

          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          UPDATER_ARTIFACT_PATH="$(find "$BUNDLE_DIR" -type f -name "$UPDATER_PATTERN" | head -n 1)"
          if [[ -z "$UPDATER_ARTIFACT_PATH" ]]; then
            echo "Updater artifact not found in $BUNDLE_DIR ($UPDATER_PATTERN)"
            exit 1
          fi

          INSTALLER_ARTIFACT_PATH="$(find "$BUNDLE_DIR" -type f -name "$INSTALLER_PATTERN" | head -n 1)"
          if [[ -z "$INSTALLER_ARTIFACT_PATH" ]]; then
            echo "Installer artifact not found in $BUNDLE_DIR ($INSTALLER_PATTERN)"
            exit 1
          fi

          UPDATER_SIG_PATH="${UPDATER_ARTIFACT_PATH}.sig"

          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "updater_artifact_path=$UPDATER_ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          echo "updater_sig_path=$UPDATER_SIG_PATH" >> "$GITHUB_OUTPUT"
          echo "installer_artifact_path=$INSTALLER_ARTIFACT_PATH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload updater asset metadata
        shell: bash
        env:
          UPDATER_API_BASE: ${{ env.UPDATER_API_BASE }}
          UPDATER_API_TOKEN: ${{ env.APP_RELEASE_CI_TOKEN }}
          UPDATER_VERSION: ${{ steps.updater_meta.outputs.version }}
          UPDATER_ASSET_TYPE: "updater"
          UPDATER_PLATFORMS: ${{ steps.updater_meta.outputs.platform }}
        run: |
          if [[ -z "${UPDATER_API_BASE:-}" ]]; then
            echo "UPDATER_API_BASE is required and cannot be empty"
            exit 1
          fi

          if [[ -z "${UPDATER_PLATFORMS:-}" ]]; then
            echo "UPDATER_PLATFORMS is required and cannot be empty"
            exit 1
          fi

          PLATFORM_KEY="$(echo "${{ steps.updater_meta.outputs.platform }}" | tr '[:lower:]-' '[:upper:]_')"
          FILE_VAR="UPDATER_FILE_${PLATFORM_KEY}"
          SIG_VAR="UPDATER_SIGNATURE_${PLATFORM_KEY}"
          ARTIFACT_PATH="${{ steps.updater_meta.outputs.updater_artifact_path }}"
          SIG_PATH="${{ steps.updater_meta.outputs.updater_sig_path }}"

          if [[ -f "$SIG_PATH" ]]; then
            SIGNATURE="$(tr -d '\r\n' < "$SIG_PATH")"
          else
            echo "Signature sidecar not found, signing artifact directly: $ARTIFACT_PATH"
            export TAURI_PRIVATE_KEY="${TAURI_SIGNING_PRIVATE_KEY}"
            export TAURI_PRIVATE_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
            SIGN_OUTPUT="$(pnpm tauri signer sign "$ARTIFACT_PATH")"
            SIGNATURE="$(echo "$SIGN_OUTPUT" | sed -n 's/^Signature: //p' | tail -n 1 | tr -d '\r\n')"
            if [[ -z "$SIGNATURE" ]]; then
              SIGNATURE="$(
                echo "$SIGN_OUTPUT" \
                  | tr -d '\r' \
                  | awk '/^[A-Za-z0-9+/=]+$/{sig=$0} END{print sig}' \
                  | tr -d '\n'
              )"
            fi
            if [[ -z "$SIGNATURE" || "$SIGNATURE" == *" "* ]]; then
              echo "Failed to parse signature from signer output"
              echo "$SIGN_OUTPUT"
              exit 1
            fi
          fi

          echo "Updater platform key: ${PLATFORM_KEY}"
          echo "Signature env var: ${SIG_VAR}"
          echo "Signature length: ${#SIGNATURE}"
          echo "Signature prefix: ${SIGNATURE:0:24}..."

          export "$FILE_VAR=${{ steps.updater_meta.outputs.updater_artifact_path }}"
          export "$SIG_VAR=$SIGNATURE"

          echo "Exported file var: ${FILE_VAR}=${{ steps.updater_meta.outputs.updater_artifact_path }}"
          echo "Exported sig var present: $(printenv "$SIG_VAR" | wc -c | tr -d ' ') bytes"

          pnpm simulate:updater

      - name: Upload installer asset metadata
        shell: bash
        env:
          UPDATER_API_BASE: ${{ env.UPDATER_API_BASE }}
          UPDATER_API_TOKEN: ${{ env.APP_RELEASE_CI_TOKEN }}
          UPDATER_VERSION: ${{ steps.updater_meta.outputs.version }}
          UPDATER_ASSET_TYPE: "installer"
          UPDATER_PLATFORMS: ${{ steps.updater_meta.outputs.platform }}
        run: |
          if [[ -z "${UPDATER_API_BASE:-}" ]]; then
            echo "UPDATER_API_BASE is required and cannot be empty"
            exit 1
          fi

          if [[ -z "${UPDATER_PLATFORMS:-}" ]]; then
            echo "UPDATER_PLATFORMS is required and cannot be empty"
            exit 1
          fi

          PLATFORM_KEY="$(echo "${{ steps.updater_meta.outputs.platform }}" | tr '[:lower:]-' '[:upper:]_')"
          FILE_VAR="UPDATER_FILE_${PLATFORM_KEY}"
          INSTALLER_PATH="${{ steps.updater_meta.outputs.installer_artifact_path }}"

          if [[ -z "$INSTALLER_PATH" || ! -f "$INSTALLER_PATH" ]]; then
            echo "Installer artifact is missing: $INSTALLER_PATH"
            exit 1
          fi

          export "$FILE_VAR=$INSTALLER_PATH"
          pnpm simulate:updater

      - name: Extract target from args
        id: extract_target
        shell: bash
        run: |
          TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.args }}
          path: |
            src-tauri/target/${{ steps.extract_target.outputs.target }}/release/bundle/
          if-no-files-found: warn
