name: Build Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # ARM64 (M1/M2)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-13"     # Intel (x86_64) - latest available for Intel
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc"
          - platform: "ubuntu-latest"
            args: "--target x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libavutil-dev libavcodec-dev libavformat-dev libavfilter-dev libswscale-dev libavdevice-dev libasound2-dev

      - name: Install dependencies (macOS only)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install ffmpeg@7 pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/opt/ffmpeg@7/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install dependencies (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Install vcpkg if not available
          if (-not (Get-Command vcpkg -ErrorAction SilentlyContinue)) {
            Write-Host "Installing vcpkg..."
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            # Checkout a specific commit to ensure FFmpeg 7.1 is installed (avoid 8.x mismatch)
            # Commit from Dec 2024 which likely has FFmpeg 7.1
            cd C:\vcpkg
            git checkout 5c64372
            .\bootstrap-vcpkg.bat
            echo "C:\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          
          # Install FFmpeg and pkgconf via vcpkg
          Write-Host "Installing FFmpeg and pkgconf via vcpkg..."
          vcpkg install ffmpeg:x64-windows pkgconf:x64-windows
          
          # Set PKG_CONFIG_PATH
          $vcpkgRoot = if ($env:VCPKG_ROOT) { $env:VCPKG_ROOT } else { "C:\vcpkg" }
          # Explicitly set VCPKG_ROOT for build scripts that rely on it
          echo "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          $pkgConfigPath = Join-Path $vcpkgRoot "installed\x64-windows\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          # Add pkgconf to PATH
          $pkgconfBin = Join-Path $vcpkgRoot "installed\x64-windows\tools\pkgconf"
          echo $pkgconfBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Set BINDGEN_EXTRA_CLANG_ARGS for bindgen to find includes
          $includePath = Join-Path $vcpkgRoot "installed\x64-windows\include"
          # Convert backslashes to forward slashes for clang compatibility
          $includePath = $includePath -replace '\\', '/'
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$includePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Set LIBCLANG_PATH to ensure bindgen uses the correct clang
          # GitHub Actions windows-latest has LLVM installed
          $llvmPath = $env:LLVM_ROOT
          if ($null -eq $llvmPath) {
              $llvmPath = "C:\Program Files\LLVM"
          }
          $libClangPath = Join-Path $llvmPath "bin"
          echo "LIBCLANG_PATH=$libClangPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Workaround for ffmpeg-sys-next 7.1.3 build failure with FFmpeg 7.0+ on Windows
          # Create dummy avfft.h as it was removed but bindgen still looks for it
          $avcodecInclude = Join-Path $vcpkgRoot "installed\x64-windows\include\libavcodec"
          if (Test-Path $avcodecInclude) {
            $avfftPath = Join-Path $avcodecInclude "avfft.h"
            if (-not (Test-Path $avfftPath)) {
              Write-Host "Creating dummy avfft.h at $avfftPath"
              New-Item -ItemType File -Path $avfftPath -Force
            }
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        shell: bash
        run: |
          if [[ "${{ matrix.args }}" == *"aarch64-apple-darwin"* ]]; then
            rustup target add aarch64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"x86_64-apple-darwin"* ]]; then
            rustup target add x86_64-apple-darwin
          elif [[ "${{ matrix.args }}" == *"x86_64-pc-windows-msvc"* ]]; then
            rustup target add x86_64-pc-windows-msvc
          elif [[ "${{ matrix.args }}" == *"x86_64-unknown-linux-gnu"* ]]; then
            rustup target add x86_64-unknown-linux-gnu
          fi

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: ${{ matrix.args }}

      - name: Extract target from args
        id: extract_target
        run: |
          TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.args }}
          path: |
            src-tauri/target/${{ steps.extract_target.outputs.target }}/release/bundle/
          if-no-files-found: warn
